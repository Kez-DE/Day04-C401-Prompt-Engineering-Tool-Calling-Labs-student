# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Gửi một câu hỏi cho người dùng."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Câu hỏi"}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Kiểu trả lời"}
        options: {type: array, default: [], items: {type: string}, description: "Các lựa chọn"}
      required: [question]

  - name: timeline
    description: "Lấy các bài đăng gần đây."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Tên tài khoản"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [screenname]

  - name: social_search
    description: "Tìm trên mạng xã hội."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Cách sắp xếp"}
        limit: {type: integer, default: 5, description: "Số lượng"}
      required: [query]

  - name: lookup
    description: "Tra cứu thông tin trên internet."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        topic: {type: string, enum: [general, news], default: "general", description: "Phân loại"}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "Khoảng thời gian"}
        max_results: {type: integer, default: 5, description: "Số kết quả"}
      required: [query]

  - name: fetch
    description: "Lấy nội dung từ một địa chỉ."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Địa chỉ"}
      required: [url]

  - name: format
    description: "Trình bày dữ liệu đã có thành văn bản."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Gửi một đoạn văn bản đi."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Nội dung"}
        confirmed: {type: boolean, default: false, description: "Cờ xác nhận"}
      required: [text]

  - name: policy
    description: "Tìm trong tài liệu nội bộ của công ty. Dùng khi user hỏi 'theo policy công ty', 'company policy', hoặc 'quy định nội bộ'. Chọn policy_area phù hợp: source_citation cho câu hỏi về xác nhận nguồn tin / fact-checking / tweet có phải nguồn hợp lệ không; ai_research cho câu hỏi về research workflow / quy trình nghiên cứu AI; data_privacy cho câu hỏi về API key / dữ liệu khách hàng / secrets; external_publishing cho câu hỏi về đăng/gửi nội dung ra ngoài (Telegram, social); tool_usage cho câu hỏi về cách dùng tool."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area:
          type: string
          enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage]
          default: "all"
          description: "Nhóm policy: source_citation=xác nhận nguồn/fact/tweet; ai_research=quy trình nghiên cứu AI; data_privacy=API key/dữ liệu khách hàng; external_publishing=đăng/gửi ra ngoài; tool_usage=cách dùng tool"
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Tìm bài báo khoa học."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: wikipedia
    description: "Tìm kiếm và lấy tóm tắt bài viết từ Wikipedia. Dùng khi user hỏi về khái niệm, người nổi tiếng, sự kiện lịch sử, hoặc cần thông tin nền (background). KHÔNG dùng cho tin tức mới (dùng lookup) hay paper khoa học (dùng papers). Ví dụ: 'X là ai?', 'Giải thích khái niệm Y', 'Transformer là gì?'"
    parameters:
      type: object
      properties:
        query: {type: string, description: "Từ khóa tìm kiếm (tên người, khái niệm, sự kiện)"}
        lang: {type: string, enum: [en, vi, fr, ja, zh], default: "en", description: "Ngôn ngữ Wikipedia: en=tiếng Anh (default), vi=tiếng Việt"}
        sentences: {type: integer, default: 5, description: "Số câu tóm tắt muốn lấy"}
      required: [query]

  - name: hacker_news
    description: "Lấy các bài đăng trending từ Hacker News. Dùng khi user hỏi về 'Hacker News', 'HN', 'tin tức công nghệ trên HN', hoặc muốn xem discussion của tech community. feed=top (default) cho bài phổ biến nhất, feed=new cho bài mới nhất, feed=best cho bài hay nhất lịch sử."
    parameters:
      type: object
      properties:
        feed: {type: string, enum: [top, new, best], default: "top", description: "Loại feed: top=trending, new=mới nhất, best=hay nhất"}
        limit: {type: integer, default: 5, description: "Số bài muốn lấy"}
      required: []

  - name: paper_text
    description: "Lấy nội dung text của một bài báo."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]
