# starter_v0 — tool declarations (intentionally vague).
# Names and descriptions here are a rough first draft. Routing rules, name->handle
# mapping, arg conventions (news/timeframe/Top), and the send-confirmation boundary
# are NOT spelled out anywhere yet. Your job is to make these declarations + the
# system prompt good enough that the agent routes correctly on the eval.
#
# If you rename a tool, keep the name in sync across:
#   this file  ->  tools/__init__.py (TOOL_FUNCTIONS)  ->  data/eval_base.json + data/eval_research_extension.json
tools:
  # ---------------- Core tools ----------------
  - name: clarify
    description: "Ask the user one clarification question when required information is missing or when an external write/send action needs explicit yes/no confirmation. For send/post/publish/dang/gui requests, always use response_type yes_no instead of text. Use this instead of guessing."
    parameters:
      type: object
      properties:
        question: {type: string, default: "", description: "Short question to ask the user."}
        response_type: {type: string, enum: [text, yes_no, choice], default: "text", description: "Use text for missing handle/URL/details; yes_no for send/post/publish confirmation."}
        options: {type: array, default: [], items: {type: string}, description: "Choices when response_type=choice."}
      required: [question]

  - name: timeline
    description: "Fetch recent tweets/posts FROM one specific account handle. Use when the user asks for posts by a person/account, e.g. Sam Altman -> screenname sama, Elon Musk -> elonmusk, Andrej Karpathy -> karpathy. Do not use for topic searches."
    parameters:
      type: object
      properties:
        screenname: {type: string, default: "", description: "Account handle without @, e.g. sama, elonmusk, karpathy."}
        limit: {type: integer, default: 5, description: "Number of recent posts requested by the user."}
      required: [screenname]

  - name: social_search
    description: "Search tweets/posts ABOUT a topic or keyword. Use for 'people are discussing X', 'tweets about X', or social trend searches. Do not use for posts from a specific account."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Narrow topic keyword exactly from the user, e.g. AI, OpenAI, GPT-5. Do not add 'news', 'today', or 'latest'."}
        search_type: {type: string, enum: [Latest, Top], default: "Latest", description: "Use Top only when the user asks for top/popular/phổ biến; otherwise Latest."}
        limit: {type: integer, default: 5, description: "Number of social posts requested."}
      required: [query]

  - name: lookup
    description: "Search the public web for current information or news. Use topic=news for news/tin tức. Use timeframe=day for hôm nay/today, week for tuần này/this week. Do not use when the user already provided a specific URL."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Narrow topic only, e.g. AI, robotics, OpenAI. Do not add 'news', 'today', or 'latest' unless explicitly part of the topic."}
        topic: {type: string, enum: [general, news], default: "general", description: "Use news for current news/tin tức; general for broad web lookup."}
        timeframe: {type: string, enum: [day, week, month, year], default: "week", description: "day=hôm nay/today; week=tuần này/this week; month/year only if requested."}
        max_results: {type: integer, default: 5, description: "Number of web results."}
      required: [query]

  - name: fetch
    description: "Read the content of one specific URL provided by the user. Use once per URL when the user provides multiple URLs. Do not use lookup for a specific URL."
    parameters:
      type: object
      properties:
        url: {type: string, default: "", description: "Exact URL from the user."}
      required: [url]

  - name: format
    description: "Format already-collected items into markdown. This tool does not fetch or search."
    parameters:
      type: object
      properties:
        items:
          type: array
          default: []
          description: "Danh sách item"
          items:
            type: object
            properties:
              title: {type: string}
              url: {type: string}
              source: {type: string}
              summary: {type: string}
              section: {type: string}
        template: {type: string, enum: [brief, sections, bullets, thread, daily_ai_vn], default: "sections", description: "Khuôn"}
        headline: {type: string, default: "", description: "Tiêu đề"}
      required: [items, template]

  # ---------------- Bonus tools ----------------
  - name: send
    description: "Send text to a Telegram channel. This has an external side effect. Call only when the user has explicitly confirmed the exact text in the current conversation; otherwise call clarify with response_type yes_no."
    parameters:
      type: object
      properties:
        text: {type: string, default: "", description: "Exact text to send, already confirmed by the user."}
        confirmed: {type: boolean, default: false, description: "Must be true only after explicit user confirmation."}
      required: [text]

  - name: source_ranker
    description: "Rank already-known source names or URLs by evidence strength for a research purpose. Use when the user asks which sources are more reliable, to rank sources, or to decide source priority before writing a factual brief. This does not browse the web."
    parameters:
      type: object
      properties:
        sources:
          type: array
          default: []
          items: {type: string}
          description: "Source names or URLs provided by the user."
        purpose: {type: string, default: "", description: "Research purpose or claim being evaluated."}
      required: [sources]

  - name: policy
    description: "Search internal company policy markdown. Use for company rules about source citation, privacy, research workflow, publishing, Telegram approval, or tool usage. Do not use public web for internal policy."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Truy vấn"}
        policy_area: {type: string, enum: [all, ai_research, source_citation, data_privacy, external_publishing, tool_usage], default: "all", description: "Nhóm"}
        top_k: {type: integer, default: 3, description: "Số mục"}
      required: [query]

  - name: papers
    description: "Search arXiv for academic papers/preprints by topic. Use for paper discovery, not for reading a specific paper's text."
    parameters:
      type: object
      properties:
        query: {type: string, default: "", description: "Từ khóa"}
        max_results: {type: integer, default: 5, description: "Số lượng"}
        sort_by: {type: string, enum: [relevance, lastUpdatedDate, submittedDate], default: "relevance", description: "Sắp xếp"}
      required: [query]

  - name: paper_text
    description: "Download/extract text from a specific arXiv paper ID or URL when the user asks to read/inspect that paper."
    parameters:
      type: object
      properties:
        arxiv_url: {type: string, default: "", description: "ID hoặc địa chỉ"}
        max_pages: {type: integer, default: 5, description: "Số trang"}
        max_chars: {type: integer, default: 8000, description: "Số ký tự"}
      required: [arxiv_url]
